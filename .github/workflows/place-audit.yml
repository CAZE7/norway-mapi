name: Place Audit

on:
  schedule:
    - cron: "0 3 * * *" # Taeglich 3 Uhr UTC
  workflow_dispatch: # Manuell triggerbar

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Coordinate Audit
        run: python3 audit_places.py --coords-only

      - name: Run Image Audit
        run: python3 audit_places.py --images-only

      - name: Commit Results
        run: |
          git config user.name "Audit Bot"
          git config user.email "audit-bot@noreply.github.com"
          git add audit-output/
          git commit -m "chore: automated place audit $(date -u +%Y-%m-%d)" || echo "No changes"
          git push

      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-output/
